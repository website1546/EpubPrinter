plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

android {
    namespace 'com.example.epubtobook'
    compileSdk 33
    defaultConfig {
        applicationId "com.example.epubtobook"
        minSdk 24
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.9.0'
    // These are the "engines" that do the conversion work
    implementation 'com.positiondev.epublib:epublib-core:3.1' { exclude group: 'xmlpull' }
    implementation 'org.jsoup:jsoup:1.15.4'
}
